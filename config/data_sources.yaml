# 数据源配置：可插拔结构。第一版默认启用 excel/csv/json 本地导入。
# 后续接入外部 API 时再把 enabled 改为 true 并填入真实 URL/参数。

sources:
  - name: excel_import
    type: excel
    enabled: true
    input_dir: data/input
    pattern: "*.xlsx"
    pick_latest: true   # 自动取目录中最新的文件；false 则全部读取

  - name: csv_import
    type: csv
    enabled: true
    input_dir: data/input
    pattern: "*.csv"
    pick_latest: false
    encoding: utf-8

  - name: json_import
    type: json
    enabled: true
    input_dir: data/input
    pattern: "*.json"
    pick_latest: false

  - name: xingtu_export
    type: excel
    enabled: false
    input_dir: data/input/xingtu
    pattern: "*.xlsx"
    pick_latest: true

  - name: public_search
    type: public_search
    enabled: false        # 由 --discover 命令行参数或 app.py 模式开关临时启用
    site_filter: "douyin.com"
    extra_query_suffixes:
      - ""
      - "测评"
      - "推荐"
      - "避雷"
      - "穿搭"
    enrich_urls: true     # 抓到的 douyin 链接交给 douyin_url_enricher 二次解析

  - name: douyin_cdp
    type: douyin_cdp
    enabled: true         # 通过 CDP + 真实 Chrome 在页面内调搜索 API，自动生成签名
    # 前提：Chrome 需以 --remote-debugging-port=9222 --remote-allow-origins=* 启动

  - name: douyin_api
    type: douyin_api
    enabled: false        # msToken 直调方案（可能被限流，作为备用）

  - name: douyin_search
    type: douyin_search
    enabled: false        # 由 --douyin-import 或 app.py 临时启用
    # 更多配置（关键词/API/字段映射）见 config/douyin_source.yaml

  - name: search_api
    type: search_api
    enabled: false
    base_url: ""
    method: GET
    headers: {}
    params_template:
      keyword: "{keyword}"
      page: "{page}"
      page_size: 20
    page_start: 1
    page_end: 1
    timeout: 15
    response_path: "data.list"   # JSON 中达人列表的路径，点号分隔
